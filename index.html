<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>말풍선 텍스트 정리기</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f6f7fb;
    color: #222;
  }
  .wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  .sub {
    margin: 0 0 20px;
    color: #555;
    line-height: 1.6;
  }
  .panel {
    background: white;
    border-radius: 18px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    padding: 18px;
    margin-bottom: 18px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 8px;
  }
  .control-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .range-box, .text-filter-box {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .controls input[type="number"],
  .controls input[type="text"] {
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 14px;
  }
  .controls input[type="number"] { width: 64px; }
  .controls input[type="text"] { min-width: 260px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .controls input[type="text"] { min-width: 180px; width: 100%; }
  }
  h2 {
    margin: 0 0 10px;
    font-size: 18px;
  }
  textarea {
    width: 100%;
    min-height: 520px;
    resize: vertical;
    border: 1px solid #d7dbe7;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    line-height: 1.8;
    background: #fcfcff;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    background: #2563eb;
    color: white;
  }
  button.secondary {
    background: #e5e7eb;
    color: #111827;
  }
  .hint {
    margin-top: 8px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  .small {
    font-size: 13px;
    color: #666;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>말풍선 텍스트 정리기</h1>
    <p class="sub">줄 앞 번호 삭제, 조건에 맞는 줄만 남기기, 기존 줄바꿈마다 빈 줄 추가, 긴 문장을 3~4어절 단위로 나누는 도구입니다.</p>

    <div class="panel">
      <div class="controls">
        <div class="control-row">
          <label><input type="checkbox" id="removeNumbers" checked> 줄 앞 번호 삭제</label>
          <label><input type="checkbox" id="addBlankLine" checked> 기존 줄바꿈마다 빈 줄 추가</label>
          <label><input type="checkbox" id="splitLines" checked> 긴 문장 자동 줄분리</label>
        </div>

        <div class="control-row">
          <label><input type="checkbox" id="keepQuotedOnly"> 따옴표가 들어간 줄만 남기기</label>
          <span class="small">예: “ ”, " ", ‘ ’ 가 포함된 줄만 사용</span>
        </div>

        <div class="control-row text-filter-box">
          <label><input type="checkbox" id="keepPrefixOnly"> 특정 텍스트로 시작하는 줄만 남기기</label>
          <input type="text" id="prefixText" placeholder="예: - / + / *" />
          <span class="small">입력한 텍스트로 시작하는 줄만 남기고 나머지는 삭제</span>
        </div>

        <div class="control-row">
          <div class="range-box">
            <span>어절 범위</span>
            <input type="number" id="minWords" value="3" min="1" max="10">
            <span>~</span>
            <input type="number" id="maxWords" value="4" min="1" max="10">
          </div>
        </div>
      </div>
      <div class="hint">필터는 함께 사용할 수도 있습니다. 둘 다 켜면 조건을 둘 다 만족하는 줄만 남습니다.</div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>원문</h2>
        <textarea id="input" placeholder="여기에 원문을 붙여넣어 주세요."></textarea>
        <div class="buttons">
          <button onclick="processText()">변환</button>
          <button class="secondary" onclick="clearInput()">입력 지우기</button>
        </div>
      </div>

      <div class="panel">
        <h2>결과</h2>
        <textarea id="output" readonly placeholder="변환 결과가 여기에 표시됩니다."></textarea>
        <div class="buttons">
          <button onclick="copyOutput()">결과 복사</button>
        </div>
      </div>
    </div>
  </div>

<script>
const BREAK_HINT_WORDS = new Set([
  "그리고","하지만","그런데","그래서","그러니까","다만",
  "정말","아까","지금","어떻게","이렇게","그만큼만",
  "마음에","믿어지지","내가","아","울고있는"
]);

function removeLeadingNumber(line) {
  return line.replace(/^\s*\d+\.\s*/, "");
}

function hasQuotes(line) {
  return /["“”'‘’]/.test(line);
}

function startsWithPrefix(line, prefix) {
  if (!prefix) return true;
  return line.trimStart().startsWith(prefix);
}

function splitLongLine(line, minWords, maxWords) {
  const trimmed = line.trim();
  if (!trimmed) return [""];
  const words = trimmed.split(/\s+/).filter(Boolean);

  if (words.length <= maxWords) return [trimmed];

  const out = [];
  let current = [];

  for (let i = 0; i < words.length; i++) {
    current.push(words[i]);

    const word = words[i];
    const nextWord = words[i + 1] || "";
    const count = current.length;
    const isLast = i === words.length - 1;

    const endsSentence = /[.!?…』」”"]$/.test(word);
    const nextStartsBeat = BREAK_HINT_WORDS.has(nextWord);

    if (isLast) {
      out.push(current.join(" "));
      current = [];
      continue;
    }

    if ((count >= minWords && endsSentence) || (count >= minWords && nextStartsBeat) || count >= maxWords) {
      out.push(current.join(" "));
      current = [];
    }
  }

  if (current.length) out.push(current.join(" "));
  return out;
}

function processText() {
  const input = document.getElementById("input").value.replace(/\r\n/g, "\n");
  const removeNumbers = document.getElementById("removeNumbers").checked;
  const addBlankLine = document.getElementById("addBlankLine").checked;
  const splitLines = document.getElementById("splitLines").checked;
  const keepQuotedOnly = document.getElementById("keepQuotedOnly").checked;
  const keepPrefixOnly = document.getElementById("keepPrefixOnly").checked;
  const prefixText = document.getElementById("prefixText").value;

  let minWords = parseInt(document.getElementById("minWords").value, 10);
  let maxWords = parseInt(document.getElementById("maxWords").value, 10);

  if (isNaN(minWords) || minWords < 1) minWords = 3;
  if (isNaN(maxWords) || maxWords < 1) maxWords = 4;
  if (minWords > maxWords) {
    const temp = minWords;
    minWords = maxWords;
    maxWords = temp;
  }

  const lines = input.split("\n");
  const keptLines = [];

  for (let rawLine of lines) {
    let line = rawLine;

    if (removeNumbers) {
      line = removeLeadingNumber(line);
    }

    const isBlank = line.trim() === "";
    if (isBlank) {
      keptLines.push("");
      continue;
    }

    if (keepQuotedOnly && !hasQuotes(line)) {
      continue;
    }

    if (keepPrefixOnly && !startsWithPrefix(line, prefixText)) {
      continue;
    }

    keptLines.push(line);
  }

  const result = [];

  keptLines.forEach((line, index) => {
    if (splitLines && line.trim() !== "") {
      result.push(...splitLongLine(line, minWords, maxWords));
    } else {
      result.push(line);
    }

    if (addBlankLine && index < keptLines.length - 1) {
      result.push("");
    }
  });

  document.getElementById("output").value = result.join("\n");
}

async function copyOutput() {
  const text = document.getElementById("output").value;
  try {
    await navigator.clipboard.writeText(text);
    alert("복사됨!");
  } catch (e) {
    const output = document.getElementById("output");
    output.focus();
    output.select();
    document.execCommand("copy");
    alert("복사됨!");
  }
}

function clearInput() {
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
}
</script>
</body>
</html>
