<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bubblecut</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #f4f6fb;
    --card: rgba(255,255,255,0.92);
    --text: #18202a;
    --sub: #5c6777;
    --line: #dde4f0;
    --primary: #4f46e5;
    --primary-2: #3730a3;
    --soft: #eef2ff;
    --shadow: 0 12px 40px rgba(30, 41, 59, 0.10);
    --radius: 22px;
  }
  body {
    margin: 0;
    font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, #eef2ff 0, transparent 34%),
      radial-gradient(circle at top right, #fce7f3 0, transparent 28%),
      var(--bg);
  }
  .wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 20px 36px;
  }
  .hero {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: end;
    margin-bottom: 20px;
  }
  .title {
    margin: 0;
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.05;
    letter-spacing: -0.03em;
  }
  .subtitle {
    margin: 10px 0 0;
    color: var(--sub);
    line-height: 1.7;
    font-size: 15px;
    max-width: 780px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 14px;
    color: var(--sub);
    font-size: 13px;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }
  .panel {
    background: var(--card);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 18px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 800;
    margin: 0 0 12px;
    letter-spacing: -0.02em;
  }
  .controls {
    display: grid;
    gap: 12px;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    font-size: 14px;
  }
  .field {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    font-size: 14px;
  }
  input[type="number"], input[type="text"] {
    height: 38px;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 0 10px;
    font-size: 14px;
    background: #fbfcff;
    color: var(--text);
  }
  input[type="number"] { width: 76px; }
  input[type="text"] { min-width: 210px; }
  .subhint {
    color: var(--sub);
    font-size: 13px;
    line-height: 1.7;
  }
  .line-rules {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .line-rule {
    border: 1px solid var(--line);
    background: linear-gradient(180deg, white, #f8faff);
    border-radius: 18px;
    padding: 14px;
  }
  .line-rule-title {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 8px;
    font-weight: 700;
  }
  .line-rule .inner {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .workspace {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .editor-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .editor-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .editor-title {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  textarea {
    width: 100%;
    min-height: 560px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 16px 18px;
    font-size: 15px;
    line-height: 1.85;
    background: #fcfdff;
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  button {
    border: 0;
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }
  button:hover {
    transform: translateY(-1px);
  }
  .primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: white;
    box-shadow: 0 10px 24px rgba(79,70,229,0.26);
  }
  .secondary {
    background: white;
    color: var(--text);
    border: 1px solid var(--line);
  }
  .note {
    padding: 14px 16px;
    background: var(--soft);
    border: 1px solid #c7d2fe;
    border-radius: 16px;
    color: #3730a3;
    line-height: 1.7;
    font-size: 13px;
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translate(-50%, 10px);
    background: #111827;
    color: white;
    padding: 12px 16px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: all .2s ease;
    box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    font-size: 14px;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  @media (max-width: 980px) {
    .hero {
      flex-direction: column;
      align-items: start;
    }
    .workspace {
      grid-template-columns: 1fr;
    }
    input[type="text"] {
      min-width: 150px;
      width: 100%;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
      <div>
        <h1 class="title">Bubblecut</h1>
        <p class="subtitle">작가용 말풍선 텍스트 정리 도구. 번호 삭제, 조건 필터링, 문장부호 우선 분리, 최대 줄 수 기준 말풍선 분리를 한 번에 처리합니다.</p>
      </div>

    </div>

    <div class="panel">
      <h2 class="section-title">설정</h2>
      <div class="controls">
        <div class="row">
          <label class="chip"><input type="checkbox" id="removeNumbers" checked> 줄 앞 번호 삭제</label>
          <label class="chip"><input type="checkbox" id="addBlankLine" checked> 기존 줄바꿈마다 빈 줄 추가</label>
          <label class="chip"><input type="checkbox" id="splitLines" checked> 긴 문장 자동 줄분리</label>
        </div>

        <div class="row">
          <label class="chip"><input type="checkbox" id="keepQuotedOnly"> 따옴표가 들어간 줄만 남기기</label>
          <label class="chip"><input type="checkbox" id="keepPrefixOnly"> 특정 텍스트로 시작하는 줄만 남기기</label>
          <div class="field">
            시작 텍스트
            <input type="text" id="prefixText" placeholder="예: - / + / *" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            말풍선 최대 줄 수
            <input type="number" id="maxLines" value="3" min="1" max="10" onchange="renderLineRules()">
            줄
          </div>
          <label class="chip"><input type="checkbox" id="preferPunctuation" checked> 문장부호 우선 분리</label>
          <label class="chip"><input type="checkbox" id="preferComma" checked> 쉼표(,) 우선 분리 포함</label>
          <button class="secondary" type="button" onclick="resetLineRulesToDefault()">줄 규칙 기본값</button>
        </div>

        <div>
          <div class="row" style="justify-content:space-between; align-items:end; margin-bottom:10px;">
            <div>
              <h3 class="section-title" style="margin:0;">줄별 어절 범위</h3>
              <div class="subhint">기본값은 첫 줄과 마지막 줄 1~2어절, 가운데 줄들은 3~4어절입니다.</div>
            </div>
          </div>
          <div id="lineRules" class="line-rules"></div>
        </div>
      </div>
    </div>

    <div class="workspace">
      <div class="panel editor-card">
        <div class="editor-head">
          <h2 class="editor-title">원문</h2>
        </div>
        <textarea id="input" placeholder="여기에 원문을 붙여넣어 주세요."></textarea>
        <div class="buttons">
          <button class="primary" onclick="processText()">변환</button>
          <button class="secondary" onclick="clearInput()">입력 지우기</button>
        </div>
      </div>

      <div class="panel editor-card">
        <div class="editor-head">
          <h2 class="editor-title">결과</h2>
        </div>
        <textarea id="output" readonly placeholder="변환 결과가 여기에 표시됩니다."></textarea>
        <div class="buttons">
          <button class="primary" onclick="copyOutput()">결과 복사</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="note">
        기본 규칙: 마침표류(. ? ! …)는 첫 줄에 있거나 현재 말풍선이 2줄 이하이면 분리하지 않습니다.
        최대 줄 수를 넘기면 남은 내용은 빈 줄을 사이에 두고 다음 말풍선으로 넘어갑니다.
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>

const BREAK_HINT_WORDS = new Set([
  "그리고","하지만","그런데","그래서","그러니까","다만",
  "정말","아까","지금","어떻게","이렇게","그만큼만",
  "마음에","믿어지지","내가","아","울고있는"
]);

function removeLeadingNumber(line) {
  return line.replace(/^\s*\d+\.\s*/, "");
}

function hasQuotes(line) {
  return /["“”'‘’]/.test(line);
}

function startsWithPrefix(line, prefix) {
  if (!prefix) return true;
  return line.trimStart().startsWith(prefix);
}

function buildDefaultRules(maxLines) {
  const rules = [];
  for (let i = 0; i < maxLines; i++) {
    const isFirst = i === 0;
    const isLast = i === maxLines - 1;
    if (isFirst || isLast) {
      rules.push({ min: 1, max: 2 });
    } else {
      rules.push({ min: 3, max: 4 });
    }
  }
  return rules;
}

function renderLineRules() {
  let maxLines = parseInt(document.getElementById("maxLines").value, 10);
  if (isNaN(maxLines) || maxLines < 1) maxLines = 3;
  if (maxLines > 10) maxLines = 10;
  document.getElementById("maxLines").value = maxLines;

  const wrap = document.getElementById("lineRules");
  const oldValues = getLineRules();
  const defaults = buildDefaultRules(maxLines);
  wrap.innerHTML = "";

  for (let i = 1; i <= maxLines; i++) {
    const saved = oldValues[i - 1] || defaults[i - 1];
    const card = document.createElement("div");
    card.className = "line-rule";
    card.innerHTML = `
      <div class="line-rule-title">${i}번째 줄</div>
      <div class="row">
        <span>어절</span>
        <input type="number" class="line-min" min="1" max="20" value="${saved.min}">
        <span>~</span>
        <input type="number" class="line-max" min="1" max="20" value="${saved.max}">
      </div>
    `;
    wrap.appendChild(card);
  }
}

function resetLineRulesToDefault() {
  renderLineRules();
}

function getLineRules() {
  const mins = Array.from(document.querySelectorAll(".line-min"));
  const maxs = Array.from(document.querySelectorAll(".line-max"));
  const rules = [];

  for (let i = 0; i < Math.min(mins.length, maxs.length); i++) {
    let min = parseInt(mins[i].value, 10);
    let max = parseInt(maxs[i].value, 10);
    if (isNaN(min) || min < 1) min = 1;
    if (isNaN(max) || max < 1) max = min;
    if (min > max) [min, max] = [max, min];
    rules.push({ min, max });
  }

  return rules;
}

function classifyWord(word) {
  if (/[.?!…]$/.test(word)) return "strong";
  if (/(,|，)$/.test(word)) return "comma";
  return "";
}

function chooseBreakLength(words, startIndex, minWords, maxWords, options) {
  const remaining = words.length - startIndex;
  if (remaining <= maxWords) return remaining;

  let fallbackLen = maxWords;
  let bestStrong = null;
  let bestComma = null;

  for (let len = minWords; len <= maxWords; len++) {
    const idx = startIndex + len - 1;
    const word = words[idx] || "";
    const nextWord = words[idx + 1] || "";
    const punctuationType = classifyWord(word);
    const nextStartsBeat = BREAK_HINT_WORDS.has(nextWord);

    if (punctuationType === "strong" && options.preferPunctuation) {
      bestStrong = len;
      break;
    }

    if (punctuationType === "comma" && options.preferPunctuation && options.preferComma && bestComma === null) {
      bestComma = len;
    }

    if (nextStartsBeat && len >= minWords) {
      fallbackLen = len;
    }
  }

  if (bestStrong !== null) return bestStrong;
  if (bestComma !== null) return bestComma;
  return fallbackLen;
}

function splitIntoLineUnits(line, rules, options) {
  const trimmed = line.trim();
  if (!trimmed) return [];

  const words = trimmed.split(/\s+/).filter(Boolean);
  const units = [];
  let index = 0;

  while (index < words.length) {
    const rule = rules[units.length % rules.length] || { min: 2, max: 3 };
    const len = chooseBreakLength(words, index, rule.min, rule.max, options);
    const slice = words.slice(index, index + len);
    units.push({
      text: slice.join(" "),
      punctuationType: classifyWord(slice[slice.length - 1] || "")
    });
    index += len;
  }

  return units;
}

function groupUnitsIntoBubbles(units, maxLines, options) {
  const bubbles = [];
  let currentBubble = [];

  for (let i = 0; i < units.length; i++) {
    currentBubble.push(units[i]);

    const currentLineCount = currentBubble.length;
    const isLast = i === units.length - 1;
    const pType = units[i].punctuationType;
    let shouldBreak = false;

    if (!isLast && options.preferPunctuation) {
      if (pType === "comma" && options.preferComma) {
        shouldBreak = true;
      }

      if (pType === "strong") {
        const lineIndex = currentLineCount - 1;
        const isFirstLine = lineIndex === 0;
        const lineCountTooSmall = currentLineCount <= 2;

        if (!isFirstLine && !lineCountTooSmall) {
          shouldBreak = true;
        }
      }
    }

    if (!isLast && currentLineCount >= maxLines) {
      shouldBreak = true;
    }

    if (shouldBreak) {
      bubbles.push(currentBubble.map(x => x.text));
      currentBubble = [];
    }
  }

  if (currentBubble.length) {
    bubbles.push(currentBubble.map(x => x.text));
  }

  return bubbles;
}

function processText() {
  const input = document.getElementById("input").value.replace(/\r\n/g, "\n");
  const removeNumbers = document.getElementById("removeNumbers").checked;
  const addBlankLine = document.getElementById("addBlankLine").checked;
  const splitLines = document.getElementById("splitLines").checked;
  const keepQuotedOnly = document.getElementById("keepQuotedOnly").checked;
  const keepPrefixOnly = document.getElementById("keepPrefixOnly").checked;
  const prefixText = document.getElementById("prefixText").value;
  const maxLines = Math.max(1, parseInt(document.getElementById("maxLines").value, 10) || 3);

  const options = {
    preferPunctuation: document.getElementById("preferPunctuation").checked,
    preferComma: document.getElementById("preferComma").checked
  };

  const lineRules = getLineRules();
  const lines = input.split("\n");
  const keptLines = [];

  for (let rawLine of lines) {
    let line = rawLine;

    if (removeNumbers) line = removeLeadingNumber(line);

    const isBlank = line.trim() === "";
    if (isBlank) {
      keptLines.push("");
      continue;
    }

    if (keepQuotedOnly && !hasQuotes(line)) continue;
    if (keepPrefixOnly && !startsWithPrefix(line, prefixText)) continue;

    keptLines.push(line);
  }

  const result = [];

  keptLines.forEach((line, index) => {
    if (splitLines && line.trim() !== "") {
      const units = splitIntoLineUnits(line, lineRules, options);
      const bubbles = groupUnitsIntoBubbles(units, maxLines, options);

      bubbles.forEach((bubble, bubbleIndex) => {
        result.push(...bubble);
        if (bubbleIndex < bubbles.length - 1) result.push("");
      });
    } else {
      result.push(line);
    }

    if (addBlankLine && index < keptLines.length - 1) result.push("");
  });

  document.getElementById("output").value = result.join("\n");
}

async function copyOutput() {
  const text = document.getElementById("output").value;
  try {
    await navigator.clipboard.writeText(text);
    showToast("복사됨");
  } catch (e) {
    const output = document.getElementById("output");
    output.focus();
    output.select();
    document.execCommand("copy");
    showToast("복사됨");
  }
}

function clearInput() {
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
}

function showToast(message) {
  const toast = document.getElementById("toast");
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1200);
}

renderLineRules();
</script>
</body>
</html>
