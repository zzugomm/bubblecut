<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>말풍선 텍스트 정리기</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f6f7fb;
    color: #222;
  }
  .wrap {
    max-width: 1320px;
    margin: 0 auto;
    padding: 24px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  .sub {
    margin: 0 0 20px;
    color: #555;
    line-height: 1.6;
  }
  .panel {
    background: white;
    border-radius: 18px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    padding: 18px;
    margin-bottom: 18px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 8px;
  }
  .control-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .range-box, .text-filter-box {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .controls input[type="number"],
  .controls input[type="text"] {
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 14px;
  }
  .controls input[type="number"] { width: 72px; }
  .controls input[type="text"] { min-width: 260px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 980px) {
    .grid { grid-template-columns: 1fr; }
    .controls input[type="text"] { min-width: 180px; width: 100%; }
  }
  h2, h3 {
    margin: 0 0 10px;
    font-size: 18px;
  }
  textarea {
    width: 100%;
    min-height: 520px;
    resize: vertical;
    border: 1px solid #d7dbe7;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    line-height: 1.8;
    background: #fcfcff;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    background: #2563eb;
    color: white;
  }
  button.secondary {
    background: #e5e7eb;
    color: #111827;
  }
  .hint {
    margin-top: 8px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  .small {
    font-size: 13px;
    color: #666;
  }
  .line-rules {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
    margin-top: 10px;
  }
  .line-rule {
    border: 1px solid #e3e7f0;
    border-radius: 14px;
    padding: 12px;
    background: #fafbff;
  }
  .line-rule-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .line-rule .row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .line-rule input[type="number"] {
    width: 64px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>말풍선 텍스트 정리기</h1>
    <p class="sub">줄 앞 번호 삭제, 조건에 맞는 줄만 남기기, 기존 줄바꿈마다 빈 줄 추가, 긴 문장을 줄 번호별 어절 범위에 따라 나누는 도구입니다.</p>

    <div class="panel">
      <div class="controls">
        <div class="control-row">
          <label><input type="checkbox" id="removeNumbers" checked> 줄 앞 번호 삭제</label>
          <label><input type="checkbox" id="addBlankLine" checked> 기존 줄바꿈마다 빈 줄 추가</label>
          <label><input type="checkbox" id="splitLines" checked> 긴 문장 자동 줄분리</label>
        </div>

        <div class="control-row">
          <label><input type="checkbox" id="keepQuotedOnly"> 따옴표가 들어간 줄만 남기기</label>
          <span class="small">예: “ ”, " ", ‘ ’ 가 포함된 줄만 사용</span>
        </div>

        <div class="control-row text-filter-box">
          <label><input type="checkbox" id="keepPrefixOnly"> 특정 텍스트로 시작하는 줄만 남기기</label>
          <input type="text" id="prefixText" placeholder="예: - / + / *" />
          <span class="small">입력한 텍스트로 시작하는 줄만 남기고 나머지는 삭제</span>
        </div>

        <div class="control-row">
          <label>말풍선 안 텍스트:
            <input type="number" id="maxLines" value="3" min="1" max="10" onchange="renderLineRules()">
            줄
          </label>
          <span class="small">각 줄마다 최소~최대 어절 범위를 따로 지정할 수 있습니다.</span>
        </div>

        <div>
          <h3>줄별 어절 범위</h3>
          <div id="lineRules" class="line-rules"></div>
          <div class="hint">예: 1줄 1~2어절 / 2줄 3~4어절 / 3줄 1~2어절처럼 설정 가능</div>
        </div>
      </div>
      <div class="hint">필터는 함께 사용할 수 있습니다. 줄 분리를 켜면, 아래의 줄별 규칙을 우선 사용합니다.</div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>원문</h2>
        <textarea id="input" placeholder="여기에 원문을 붙여넣어 주세요."></textarea>
        <div class="buttons">
          <button onclick="processText()">변환</button>
          <button class="secondary" onclick="clearInput()">입력 지우기</button>
        </div>
      </div>

      <div class="panel">
        <h2>결과</h2>
        <textarea id="output" readonly placeholder="변환 결과가 여기에 표시됩니다."></textarea>
        <div class="buttons">
          <button onclick="copyOutput()">결과 복사</button>
        </div>
      </div>
    </div>
  </div>

<script>
const BREAK_HINT_WORDS = new Set([
  "그리고","하지만","그런데","그래서","그러니까","다만",
  "정말","아까","지금","어떻게","이렇게","그만큼만",
  "마음에","믿어지지","내가","아","울고있는"
]);

const DEFAULT_RULES = [
  { min: 1, max: 2 },
  { min: 3, max: 4 },
  { min: 1, max: 2 },
  { min: 2, max: 3 },
  { min: 2, max: 3 },
  { min: 2, max: 3 },
  { min: 2, max: 3 },
  { min: 2, max: 3 },
  { min: 2, max: 3 },
  { min: 2, max: 3 }
];

function removeLeadingNumber(line) {
  return line.replace(/^\s*\d+\.\s*/, "");
}

function hasQuotes(line) {
  return /["“”'‘’]/.test(line);
}

function startsWithPrefix(line, prefix) {
  if (!prefix) return true;
  return line.trimStart().startsWith(prefix);
}

function renderLineRules() {
  let maxLines = parseInt(document.getElementById("maxLines").value, 10);
  if (isNaN(maxLines) || maxLines < 1) maxLines = 3;
  if (maxLines > 10) maxLines = 10;
  document.getElementById("maxLines").value = maxLines;

  const wrap = document.getElementById("lineRules");
  const oldValues = getLineRules();
  wrap.innerHTML = "";

  for (let i = 1; i <= maxLines; i++) {
    const fallback = DEFAULT_RULES[i - 1] || { min: 2, max: 3 };
    const saved = oldValues[i - 1] || fallback;

    const card = document.createElement("div");
    card.className = "line-rule";
    card.innerHTML = `
      <div class="line-rule-title">${i}번째 줄</div>
      <div class="row">
        <span>어절</span>
        <input type="number" class="line-min" min="1" max="20" value="${saved.min}">
        <span>~</span>
        <input type="number" class="line-max" min="1" max="20" value="${saved.max}">
      </div>
    `;
    wrap.appendChild(card);
  }
}

function getLineRules() {
  const mins = Array.from(document.querySelectorAll(".line-min"));
  const maxs = Array.from(document.querySelectorAll(".line-max"));
  const rules = [];

  for (let i = 0; i < Math.min(mins.length, maxs.length); i++) {
    let min = parseInt(mins[i].value, 10);
    let max = parseInt(maxs[i].value, 10);
    if (isNaN(min) || min < 1) min = 1;
    if (isNaN(max) || max < 1) max = min;
    if (min > max) [min, max] = [max, min];
    rules.push({ min, max });
  }

  return rules;
}

function chooseBreakLength(words, startIndex, minWords, maxWords) {
  const remaining = words.length - startIndex;
  if (remaining <= maxWords) return remaining;

  let bestLen = maxWords;

  for (let len = minWords; len <= maxWords; len++) {
    const idx = startIndex + len - 1;
    const word = words[idx] || "";
    const nextWord = words[idx + 1] || "";
    const endsSentence = /[.!?…』」”"]$/.test(word);
    const nextStartsBeat = BREAK_HINT_WORDS.has(nextWord);

    if (endsSentence || nextStartsBeat) {
      bestLen = len;
      break;
    }
  }

  return bestLen;
}

function splitByLineRules(line, rules) {
  const trimmed = line.trim();
  if (!trimmed) return [""];

  const words = trimmed.split(/\s+/).filter(Boolean);
  if (!words.length) return [""];

  const out = [];
  let index = 0;

  for (let lineIndex = 0; lineIndex < rules.length && index < words.length; lineIndex++) {
    const rule = rules[lineIndex] || { min: 2, max: 3 };
    const len = chooseBreakLength(words, index, rule.min, rule.max);
    out.push(words.slice(index, index + len).join(" "));
    index += len;
  }

  if (index < words.length) {
    if (out.length) {
      out[out.length - 1] += " " + words.slice(index).join(" ");
    } else {
      out.push(words.slice(index).join(" "));
    }
  }

  return out;
}

function processText() {
  const input = document.getElementById("input").value.replace(/\r\n/g, "\n");
  const removeNumbers = document.getElementById("removeNumbers").checked;
  const addBlankLine = document.getElementById("addBlankLine").checked;
  const splitLines = document.getElementById("splitLines").checked;
  const keepQuotedOnly = document.getElementById("keepQuotedOnly").checked;
  const keepPrefixOnly = document.getElementById("keepPrefixOnly").checked;
  const prefixText = document.getElementById("prefixText").value;
  const lineRules = getLineRules();

  const lines = input.split("\n");
  const keptLines = [];

  for (let rawLine of lines) {
    let line = rawLine;

    if (removeNumbers) {
      line = removeLeadingNumber(line);
    }

    const isBlank = line.trim() === "";
    if (isBlank) {
      keptLines.push("");
      continue;
    }

    if (keepQuotedOnly && !hasQuotes(line)) {
      continue;
    }

    if (keepPrefixOnly && !startsWithPrefix(line, prefixText)) {
      continue;
    }

    keptLines.push(line);
  }

  const result = [];

  keptLines.forEach((line, index) => {
    if (splitLines && line.trim() !== "") {
      result.push(...splitByLineRules(line, lineRules));
    } else {
      result.push(line);
    }

    if (addBlankLine && index < keptLines.length - 1) {
      result.push("");
    }
  });

  document.getElementById("output").value = result.join("\n");
}

async function copyOutput() {
  const text = document.getElementById("output").value;
  try {
    await navigator.clipboard.writeText(text);
    alert("복사됨!");
  } catch (e) {
    const output = document.getElementById("output");
    output.focus();
    output.select();
    document.execCommand("copy");
    alert("복사됨!");
  }
}

function clearInput() {
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
}

renderLineRules();
</script>
</body>
</html>
